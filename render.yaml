# render.yaml — deploy blueprint for Render.com
# When you connect this repo on Render and choose "Blueprint", Render reads this
# file and sets almost everything up for you. You only add your API key.

services:
  - type: web
    name: koodeck
    runtime: node
    plan: starter          # the paid Starter plan includes a persistent disk;
                           # the free plan works too but decks are wiped on restarts
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # you'll paste this in the Render dashboard (kept secret)
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_SECRET
        generateValue: true   # Render auto-creates a secure random value; keeps logins working
      - key: ALTERNATE_SITE_URL
        sync: false        # optional: the address of your other-language site
      - key: TURNSTILE_SITE_KEY
        sync: false        # optional: Cloudflare Turnstile (see SECURITY_GUIDE.md)
      - key: TURNSTILE_SECRET_KEY
        sync: false        # optional: Cloudflare Turnstile (see SECURITY_GUIDE.md)
    disk:
      name: koodeck-data
      mountPath: /var/data
      sizeGB: 1
