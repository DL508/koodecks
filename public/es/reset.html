<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restablecer contraseña · KooDeck</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .auth-wrap{max-width:400px;margin:7vh auto 0;padding:0 18px;}
    .auth-card{background:#fff;border:3px solid var(--ink);border-radius:20px;padding:26px;box-shadow:var(--shadow);}
    .auth-card h1{font-family:var(--font-display);font-size:23px;margin:0 0 6px;}
    .auth-card p.sub{font-weight:600;opacity:.8;margin:0 0 16px;font-size:14px;}
    .auth-card label{display:block;font-weight:800;font-size:13px;margin:12px 0 4px;}
    .auth-card input{width:100%;box-sizing:border-box;border:2.5px solid var(--ink);border-radius:11px;padding:11px 12px;font:inherit;font-weight:700;}
    .auth-card button{width:100%;margin-top:16px;border:2.5px solid var(--ink);border-radius:12px;padding:12px;font:inherit;font-weight:800;background:var(--violet);color:#fff;cursor:pointer;}
    .msg{margin-top:12px;font-weight:700;font-size:13.5px;}
    .msg.err{color:#c0392b;} .msg.ok{color:#1e7e46;}
    .hp{position:absolute;left:-9999px;} .ts-box{margin-top:14px;}
    .back{display:block;text-align:center;margin-top:14px;font-weight:800;color:var(--violet);text-decoration:none;font-size:13.5px;}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/es/"><span class="brand-mark">▶</span><span class="brand-name">KooDeck</span></a>
  </header>
  <main class="auth-wrap">
    <div class="auth-card">
      <!-- REQUEST view (no token in URL): ask for email -->
      <div id="request-view">
        <h1>¿Olvidaste tu contraseña?</h1>
        <p class="sub">Escribe el correo de tu cuenta y te enviaremos un enlace para restablecerla.</p>
        <label for="email">Correo</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
        <input class="hp" id="hp-website" tabindex="-1" autocomplete="off" placeholder="Leave this empty" />
        <div id="ts-box" class="ts-box" data-tskey="{{TS_KEY}}"></div>
        <button id="request-btn">Enviar enlace</button>
        <div id="request-msg" class="msg"></div>
        <a class="back" href="/es/login">← Volver a iniciar sesión</a>
      </div>
      <!-- RESET view (token in URL): set a new password -->
      <div id="reset-view" style="display:none;">
        <h1>Elige una nueva contraseña</h1>
        <p class="sub">Escribe una nueva contraseña para tu cuenta.</p>
        <label for="new-pass">Nueva contraseña</label>
        <input id="new-pass" type="password" autocomplete="new-password" placeholder="Al menos 8 caracteres" />
        <button id="reset-btn">Guardar contraseña</button>
        <div id="reset-msg" class="msg"></div>
        <a class="back" href="/es/login">← Volver a iniciar sesión</a>
      </div>
    </div>
  </main>
  <script>
  (function(){
    var $=function(id){return document.getElementById(id);};
    var params=new URLSearchParams(location.search);
    var token=params.get("token");
    var base=location.pathname.indexOf("/es/")===0?"/es":"";

    if(token){
      $("request-view").style.display="none";
      $("reset-view").style.display="block";
      $("reset-btn").addEventListener("click",function(){
        var pw=$("new-pass").value;
        if(pw.length<8){$("reset-msg").className="msg err";$("reset-msg").textContent="La contraseña debe tener al menos 8 caracteres.";return;}
        $("reset-btn").disabled=true;
        fetch("/api/auth/reset",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({token:token,password:pw})})
          .then(function(r){return r.json();}).then(function(d){
            if(d.ok){$("reset-msg").className="msg ok";$("reset-msg").textContent="¡Contraseña cambiada! Te llevamos a la app…";setTimeout(function(){location.href=base+"/app";},1200);}
            else{$("reset-btn").disabled=false;$("reset-msg").className="msg err";$("reset-msg").textContent=d.error||"Algo salió mal.";}
          }).catch(function(){$("reset-btn").disabled=false;$("reset-msg").className="msg err";$("reset-msg").textContent="Algo salió mal. Try again.";});
      });
    } else {
      // Turnstile (only if configured)
      var tsKey=($("ts-box").dataset.tskey||"").trim();
      if(tsKey && tsKey.indexOf("{")===-1){
        var sc=document.createElement("script");
        sc.src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=__tsReady";
        sc.async=true;sc.defer=true;
        window.__tsReady=function(){window.turnstile.render($("ts-box"),{sitekey:tsKey,callback:function(t){window.__tsToken=t;}});};
        document.head.appendChild(sc);
      }
      $("request-btn").addEventListener("click",function(){
        var email=$("email").value.trim();
        if(!email){$("request-msg").className="msg err";$("request-msg").textContent="Escribe tu correo, por favor.";return;}
        $("request-btn").disabled=true;
        fetch("/api/auth/request-reset",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({email:email,website:$("hp-website").value,turnstileToken:window.__tsToken||""})})
          .then(function(r){return r.json();}).then(function(d){
            $("request-msg").className="msg ok";
            $("request-msg").textContent=d.message||"Si existe una cuenta con ese correo, el enlace va en camino.";
          }).catch(function(){$("request-btn").disabled=false;$("request-msg").className="msg err";$("request-msg").textContent="Algo salió mal. Try again.";});
      });
    }
  })();
  </script>
  <script src="/es/chrome.js" defer></script>
</body>
</html>
