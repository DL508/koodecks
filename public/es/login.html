<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión · KooDeck</title>
  <meta name="theme-color" content="#4f3ff0" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/es/styles.css" />
  <style>
    .auth-wrap { max-width: 440px; margin: 6vh auto 0; padding: 0 18px; }
    .auth-card { background:#fff; border:3px solid var(--ink); border-radius:22px; padding:26px 22px; box-shadow:var(--shadow); }
    .auth-tabs { display:flex; gap:8px; margin-bottom:18px; }
    .auth-tab { flex:1; font:inherit; font-weight:800; font-size:15px; cursor:pointer; padding:11px; min-height:46px; border:2.5px solid var(--ink); border-radius:12px; background:#fff; }
    .auth-tab.on { background:var(--sun); }
    .auth-field { display:block; font-weight:800; font-size:13px; margin:12px 0 5px; }
    .auth-input { width:100%; font:inherit; font-weight:700; padding:12px 13px; border:2.5px solid var(--ink); border-radius:12px; background:#fffdf6; }
    .auth-msg { font-weight:800; font-size:13.5px; margin-top:12px; display:none; }
    .auth-msg.bad { color:#c81d4e; } .auth-msg.ok { color:#1f9d55; }
    .auth-note { text-align:center; font-weight:700; font-size:12.5px; opacity:.7; margin-top:16px; }
    .ts-box { margin-top:14px; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/es/"><span class="brand-mark">▶</span><span class="brand-name">KooDeck</span></a>
  </header>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab on">Iniciar sesión</button>
        <button id="tab-signup" class="auth-tab">Regístrate gratis</button>
      </div>

      <h1 id="auth-title" style="font-family:var(--font-display);font-size:22px;margin:0 0 2px;">¡Qué bueno verte!</h1>
      <p id="auth-sub" style="font-weight:600;opacity:.8;font-size:13px;margin:0;">Inicia sesión para crear y administrar tus decks.</p>

      <label class="auth-field" for="email">Correo electrónico</label>
      <input id="email" class="auth-input" type="email" inputmode="email" autocomplete="email" placeholder="tu@escuela.edu" />

      <label class="auth-field" for="password">Contraseña</label>
      <input id="password" class="auth-input" type="password" autocomplete="current-password" placeholder="Mínimo 8 caracteres" />

      <input id="hp-website" name="website" type="text" tabindex="-1" autocomplete="off" aria-hidden="true"
             style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" />
      <div id="ts-box" class="ts-box" data-tskey="{{TS_KEY}}"></div>

      <button id="submit" class="big-btn" style="margin-top:16px;">Iniciar sesión</button>
      <p id="msg" class="auth-msg"></p>

      <p class="auth-note" id="switch-note">¿Eres nuevo? <a href="#" id="to-signup" style="color:var(--violet);font-weight:800;">Crea una cuenta gratis →</a></p>
      <p class="auth-note">Las cuentas son para docentes y familias. Los estudiantes solo abren enlaces de decks — sin cuenta.</p>
    </div>
  </main>

  <script>
  (function () {
    const $ = (id) => document.getElementById(id);
    let mode = location.pathname === "/signup" ? "signup" : "login";
    const params = new URLSearchParams(location.search);
    const nextUrl = params.get("next") || "/es/app";

    function paint() {
      const signup = mode === "signup";
      $("tab-login").classList.toggle("on", !signup);
      $("tab-signup").classList.toggle("on", signup);
      $("auth-title").textContent = signup ? "Crea tu cuenta gratis" : "¡Qué bueno verte!";
      $("auth-sub").textContent = signup ? "3 decks gratis al día, sin tarjeta." : "Inicia sesión para crear y administrar tus decks.";
      $("password").autocomplete = signup ? "new-password" : "current-password";
      $("submit").textContent = signup ? "Regístrate gratis" : "Iniciar sesión";
      $("switch-note").innerHTML = signup
        ? '¿Ya tienes cuenta? <a href="#" id="to-login" style="color:var(--violet);font-weight:800;">Inicia sesión →</a>'
        : '¿Eres nuevo? <a href="#" id="to-signup" style="color:var(--violet);font-weight:800;">Crea una cuenta gratis →</a>';
      wireSwitch();
    }
    function wireSwitch() {
      const s = $("to-signup"), l = $("to-login");
      if (s) s.onclick = (e) => { e.preventDefault(); mode = "signup"; paint(); };
      if (l) l.onclick = (e) => { e.preventDefault(); mode = "login"; paint(); };
    }
    $("tab-login").onclick = () => { mode = "login"; paint(); };
    $("tab-signup").onclick = () => { mode = "signup"; paint(); };

    $("submit").onclick = async () => {
      const msg = $("msg"); msg.style.display = "none"; msg.className = "auth-msg";
      const email = $("email").value.trim(), password = $("password").value;
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { fail("Escribe un correo electrónico válido."); return; }
      if (password.length < 8) { fail("La contraseña debe tener al menos 8 caracteres."); return; }
      $("submit").disabled = true;
      try {
        const res = await fetch("/api/auth/" + (mode === "signup" ? "register" : "login"), {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ email, password, website: $("hp-website").value, turnstileToken: window.__tsToken || "" }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { location.href = nextUrl; }
        else { fail(data.error || "Algo salió mal. Inténtalo de nuevo, por favor."); $("submit").disabled = false; }
      } catch (e) { fail("No pudimos conectar con KooDeck. Revisa tu internet e inténtalo de nuevo."); $("submit").disabled = false; }
    };
    function fail(t) { const m = $("msg"); m.textContent = t; m.className = "auth-msg bad"; m.style.display = "block"; }
    $("email").addEventListener("keydown", (e) => { if (e.key === "Enter") $("password").focus(); });
    $("password").addEventListener("keydown", (e) => { if (e.key === "Enter") $("submit").click(); });

    const tsKey = ($("ts-box").dataset.tskey || "").trim();
    if (tsKey && !tsKey.includes("{")) {
      const sc = document.createElement("script");
      sc.src = "https://challenges.cloudflare.com/turnstile/v0/api.js?onload=__tsReady";
      sc.async = true; sc.defer = true;
      window.__tsReady = () => window.turnstile.render($("ts-box"), { sitekey: tsKey, callback: (t) => { window.__tsToken = t; } });
      document.head.appendChild(sc);
    }
    paint();
  })();
  </script>
  <script src="/es/chrome.js" defer></script>
</body>
</html>
