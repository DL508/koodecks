<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Today's Decks · KooDeck</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .g-wrap{max-width:1000px;margin:4vh auto 0;padding:0 18px 40px;}
    .g-head{text-align:center;margin-bottom:22px;}
    .g-head h1{font-family:var(--font-display);font-size:28px;margin:0 0 4px;}
    .g-head p{font-weight:600;opacity:.8;margin:0;}
    .g-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
    .g-card{display:block;text-decoration:none;color:var(--ink);background:#fff;border:3px solid var(--ink);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
    .g-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:52px;border-bottom:2.5px solid var(--ink);}
    .g-body{padding:12px 14px;}
    .g-body h3{font-family:var(--font-display);font-size:15px;margin:0 0 6px;line-height:1.15;}
    .g-open{font-weight:800;font-size:12.5px;color:var(--violet);}
    .g-empty{text-align:center;font-weight:700;opacity:.7;padding:40px;}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><span class="brand-mark">▶</span><span class="brand-name">KooDeck</span></a>
    <a href="/app" class="ghost-btn" style="margin-left:auto;">Make a deck ✨</a>
  </header>
  <main class="g-wrap">
    <div class="g-head"><h1>Today's Decks ✨</h1><p>Fresh study decks the community made today.</p></div>
    <div class="g-grid" id="grid"><p class="g-empty">Loading…</p></div>
  </main>
  <script>
  (function(){
    var tints=["#8fd8ef","#ffd3ea","#dff2bd","#c9c2ff","#ffe0b2","#b2f0e6"];
    fetch("/api/decks/today?lang=en").then(r=>r.json()).then(d=>{
      var grid=document.getElementById("grid");
      if(!d.decks||!d.decks.length){grid.innerHTML='<p class="g-empty">No decks yet today — <a href="/app" style="color:var(--violet);font-weight:800;">be the first to make one!</a></p>';return;}
      grid.innerHTML="";
      d.decks.forEach(function(e,i){
        var a=document.createElement("a");a.className="g-card";a.href="/d/"+e.slug;
        a.innerHTML='<div class="g-thumb" style="background:'+tints[i%tints.length]+'">'+(e.heroEmoji||"✨")+'</div>'+
          '<div class="g-body"><h3>'+(e.title||"Untitled deck")+'</h3><span class="g-open">Open deck →</span></div>';
        grid.appendChild(a);
      });
    }).catch(function(){document.getElementById("grid").innerHTML='<p class="g-empty">Couldn\'t load decks. Try again later.</p>';});
  })();
  </script>
  <script src="/chrome.js" defer></script>
</body>
</html>
