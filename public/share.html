<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} · KooDeck</title>
  <meta name="description" content="{{DESC}}" />
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESC}}" />
  <meta property="og:image" content="{{IMAGE}}" />
  <meta property="og:type" content="article" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#4f3ff0" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:ital,wght@0,500;0,700;0,800;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/themes.css" />
  <style>
    .remix-cta {
      margin: 26px 0 60px; text-align: center;
      background: #fff; border: 3px solid var(--ink); border-radius: 22px;
      padding: 26px 20px; box-shadow: var(--shadow);
    }
    .remix-cta h2 { font-family: var(--font-display); font-size: clamp(22px,4vw,30px); margin: 0 0 6px; }
    .remix-cta p { font-weight: 700; opacity: 0.8; margin: 0 0 16px; }
    .owner-banner {
      margin: 0 0 18px; background: #eafff3; border: 2.5px solid var(--ink);
      border-radius: 16px; padding: 12px 16px; font-weight: 800;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap; box-shadow: var(--shadow);
    }
    .owner-banner .grow { flex: 1; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">▶</span>
      <span class="brand-name">KooDeck</span>
    </a>
  </header>

  <main class="wrap">
    <div id="owner-banner" class="owner-banner hidden">
      <span class="grow">🎉 This is your deck now! Give it a name, then share it.</span>
      <button id="owner-name" class="ghost-btn">✏️ Name it</button>
    </div>

    <div id="rename-panel" class="rename hidden">
      <label for="deck-title">Deck title</label>
      <input id="deck-title" maxlength="80" placeholder="My awesome deck" />
      <label for="deck-author">Your name (or nickname)</label>
      <input id="deck-author" maxlength="40" placeholder="e.g. Maya R." />
      <button id="save-name" class="big-btn small">Save ✔</button>
    </div>

    <div class="deck-toolbar">
      <button id="remix-top" class="ghost-btn">✨ Make one like this</button>
      <div class="toolbar-actions">
        <a href="/app" class="ghost-btn">➕ New deck</a>
        <button id="gc-btn" class="ghost-btn" title="Post this deck as a link in Google Classroom. It's an AI summary — give it a quick review before assigning.">📚 Google Classroom</button>
        <button id="img-btn" class="ghost-btn">🖼️ Save image</button>
        <button id="copy-btn" class="big-btn small">Copy link 🔗</button>
      </div>
    </div>

    <div id="deck-root"></div>

    <section class="remix-cta">
      <h2>Like this deck? Make it yours ✨</h2>
      <p>Same ideas, your look and your name — in one tap. No sign-up.</p>
      <button id="remix-open" class="big-btn" style="max-width:340px;">Make one like this</button>

      <div id="remix-panel" class="maker hidden" style="margin-top:20px; text-align:left;">
        <label class="field-label">Pick your look</label>
        <div id="remix-themes" class="theme-row" role="radiogroup" aria-label="Theme">
          <button type="button" class="theme-pick" data-theme="space"><span class="swatch sw-space"></span>Space</button>
          <button type="button" class="theme-pick" data-theme="ocean"><span class="swatch sw-ocean"></span>Ocean</button>
          <button type="button" class="theme-pick" data-theme="jungle"><span class="swatch sw-jungle"></span>Jungle</button>
          <button type="button" class="theme-pick" data-theme="candy"><span class="swatch sw-candy"></span>Candy</button>
          <button type="button" class="theme-pick" data-theme="comic"><span class="swatch sw-comic"></span>Comic</button>
          <button type="button" class="theme-pick" data-theme="notebook"><span class="swatch sw-notebook"></span>Notebook</button>
        </div>
        <label class="field-label" for="remix-title">Give it a title</label>
        <div class="url-row"><input id="remix-title" maxlength="80" placeholder="My version" /></div>
        <label class="field-label" for="remix-author">Your name (or nickname)</label>
        <div class="url-row"><input id="remix-author" maxlength="40" placeholder="e.g. Sam K." /></div>
        <input id="hp-website" name="website" type="text" tabindex="-1" autocomplete="off" aria-hidden="true"
               style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" />
        <button id="remix-make" class="big-btn" type="button">Create my version 🎉</button>
        <p id="remix-err" class="error hidden" role="alert"></p>
      </div>
    </section>
  </main>

  <footer class="foot">
    <p>Made with KooDeck · Decks are AI summaries — always double-check important facts with your teacher.</p>
  </footer>

  <div id="toast" class="toast hidden"></div>

  <script id="deck-data" type="application/json">{{DECK_JSON}}</script>
  <script src="/renderer.js"></script>
  <script src="/classroom.js"></script>
  <script>
    (function () {
      const deck = JSON.parse(document.getElementById("deck-data").textContent);
      const $ = (id) => document.getElementById(id);
      renderDeck(deck, $("deck-root"));

      const toast = (m) => {
        const t = $("toast");
        t.textContent = m; t.classList.remove("hidden");
        clearTimeout(t._t); t._t = setTimeout(() => t.classList.add("hidden"), 2600);
      };

      $("copy-btn").addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(location.origin + location.pathname); toast("Link copied! 📋"); }
        catch { toast(location.origin + location.pathname); }
      });

      // ---- Share to Google Classroom (no login, no roster, no student data) ----
      $("gc-btn").addEventListener("click", () => {
        const deckUrl = location.origin + location.pathname;
        const shareUrl = KooDeckClassroom.classroomShareUrl(deckUrl, deck.title);
        window.open(shareUrl, "_blank", "noopener");
        toast("Opening Google Classroom — pick your class to post it 📚");
      });

      $("img-btn").addEventListener("click", async () => {
        toast("Making your image… 🖼️");
        try {
          const res = await fetch(location.pathname.replace(/\/$/, "") + "/image.png");
          if (!res.ok) throw new Error();
          const blob = await res.blob();
          const file = new File([blob], deck.slug + ".png", { type: "image/png" });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], title: deck.title }); return; } catch (e) {}
          }
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = file.name;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 4000);
          toast("Image saved! Post it anywhere 🎉");
        } catch (e) { toast("Couldn't make the image — try again"); }
      });

      // ---- remix: "Make one like this" ----
      let remixTheme = deck.theme || "space";
      function paintRemixThemes() {
        document.querySelectorAll("#remix-themes .theme-pick").forEach((b) =>
          b.classList.toggle("selected", b.dataset.theme === remixTheme));
      }
      function openRemix() {
        $("remix-panel").classList.remove("hidden");
        $("remix-title").value = deck.title ? deck.title + " (my version)" : "";
        paintRemixThemes();
        $("remix-panel").scrollIntoView({ behavior: "smooth", block: "center" });
        $("remix-author").focus();
      }
      $("remix-open").addEventListener("click", openRemix);
      $("remix-top").addEventListener("click", openRemix);
      $("remix-themes").addEventListener("click", (e) => {
        const b = e.target.closest(".theme-pick");
        if (!b) return;
        remixTheme = b.dataset.theme; paintRemixThemes();
      });
      $("remix-make").addEventListener("click", async () => {
        $("remix-err").classList.add("hidden");
        $("remix-make").disabled = true;
        $("remix-make").textContent = "Creating… ✨";
        try {
          const res = await fetch("/api/decks/" + deck.slug + "/remix", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              theme: remixTheme,
              title: $("remix-title").value,
              authorName: $("remix-author").value,
              website: $("hp-website").value,
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            $("remix-err").textContent = data.error || "Something went wrong. Please try again.";
            $("remix-err").classList.remove("hidden");
            $("remix-make").disabled = false;
            $("remix-make").textContent = "Create my version 🎉";
            return;
          }
          location.href = "/d/" + data.slug + "#k=" + encodeURIComponent(data.editKey);
        } catch (e) {
          $("remix-err").textContent = "Couldn't reach KooDeck. Please try again.";
          $("remix-err").classList.remove("hidden");
          $("remix-make").disabled = false;
          $("remix-make").textContent = "Create my version 🎉";
        }
      });

      // ---- owner tools (only when we hold this deck's edit key) ----
      function getEditKey() {
        const m = location.hash.match(/[#&]k=([^&]+)/);
        return m ? decodeURIComponent(m[1]) : null;
      }
      const editKey = getEditKey();
      if (editKey) {
        $("owner-banner").classList.remove("hidden");
        $("deck-title").value = deck.title || "";
        $("deck-author").value = deck.authorName || "";
        $("owner-name").addEventListener("click", () => $("rename-panel").classList.toggle("hidden"));
        $("save-name").addEventListener("click", async () => {
          const res = await fetch("/api/decks/" + deck.slug, {
            method: "PATCH",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ title: $("deck-title").value, authorName: $("deck-author").value, editKey: editKey }),
          });
          if (res.ok) {
            const data = await res.json();
            renderDeck(data.deck, $("deck-root"));
            deck.title = data.deck.title; deck.authorName = data.deck.authorName;
            $("rename-panel").classList.add("hidden");
            toast("Saved ✔");
          } else {
            toast("Couldn't save — try again");
          }
        });
      }
    })();
  </script>
  <script src="/chrome.js" defer></script>
</body>
</html>
