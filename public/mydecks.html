<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Decks · KooDeck</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .g-wrap{max-width:1000px;margin:4vh auto 0;padding:0 18px 40px;}
    .g-head{text-align:center;margin-bottom:22px;}
    .g-head h1{font-family:var(--font-display);font-size:28px;margin:0 0 4px;}
    .g-head p{font-weight:600;opacity:.8;margin:0;}
    .g-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
    .g-card{background:#fff;border:3px solid var(--ink);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
    .g-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:52px;border-bottom:2.5px solid var(--ink);text-decoration:none;}
    .g-body{padding:12px 14px;}
    .g-body h3{font-family:var(--font-display);font-size:15px;margin:0 0 8px;line-height:1.15;}
    .g-actions{display:flex;gap:6px;flex-wrap:wrap;}
    .g-actions a,.g-actions button{font:inherit;font-weight:800;font-size:12px;cursor:pointer;text-decoration:none;border:2px solid var(--ink);border-radius:9px;padding:5px 9px;background:#fff;color:var(--ink);}
    .g-actions .prim{background:var(--violet);color:#fff;}
    .g-empty{text-align:center;font-weight:700;opacity:.75;padding:40px;}
    .g-empty a{color:var(--violet);}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><span class="brand-mark">▶</span><span class="brand-name">KooDeck</span></a>
    <a href="/app" class="ghost-btn" style="margin-left:auto;">Make a deck ✨</a>
  </header>
  <main class="g-wrap">
    <div class="g-head"><h1>My Decks 📚</h1><p>Decks you've created while logged in.</p></div>
    <div class="g-grid" id="grid"><p class="g-empty">Loading…</p></div>
  </main>
  <script>
  (function(){
    var tints=["#8fd8ef","#ffd3ea","#dff2bd","#c9c2ff","#ffe0b2","#b2f0e6"];
    fetch("/api/my/decks").then(function(r){
      if(r.status===401){document.getElementById("grid").innerHTML='<p class="g-empty">Please <a href="/login?next=/mydecks" style="font-weight:800;">log in</a> to see your decks.</p>';return null;}
      return r.json();
    }).then(function(d){
      if(!d)return;
      var grid=document.getElementById("grid");
      if(!d.decks||!d.decks.length){grid.innerHTML='<p class="g-empty">You haven\'t made any decks yet. <a href="/app" style="font-weight:800;">Make your first one →</a></p>';return;}
      grid.innerHTML="";
      d.decks.forEach(function(e,i){
        var card=document.createElement("div");card.className="g-card";
        var dashBtn = e.isDash ? '<a class="prim" href="/play?dash='+e.slug+'">Play Dash ⚡</a>' : '<button class="prim" data-dash="'+e.slug+'">Make Dash ⚡</button>';
        card.innerHTML='<a class="g-thumb" href="/d/'+e.slug+'" style="background:'+tints[i%tints.length]+'">'+(e.heroEmoji||"✨")+'</a>'+
          '<div class="g-body"><h3>'+(e.title||"Untitled deck")+'</h3>'+
          '<div class="g-actions"><a href="/d/'+e.slug+'">Open</a>'+dashBtn+'</div></div>';
        grid.appendChild(card);
      });
      // "Make Dash" turns a deck into a playable Dash (owner is logged in, so authorized by account)
      grid.addEventListener("click",function(ev){
        var b=ev.target.closest("button[data-dash]");if(!b)return;
        b.disabled=true;b.textContent="…";
        fetch("/api/decks/"+b.dataset.dash+"/to-dash",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({})})
          .then(r=>r.json()).then(function(res){
            if(res.ok){b.outerHTML='<a class="prim" href="/play?dash='+res.dashSlug+'">Play Dash ⚡</a>';}
            else{b.disabled=false;b.textContent="Make Dash ⚡";alert(res.error||"Couldn't make a Dash from this deck.");}
          }).catch(function(){b.disabled=false;b.textContent="Make Dash ⚡";});
      });
    });
  })();
  </script>
  <script src="/chrome.js" defer></script>
</body>
</html>
